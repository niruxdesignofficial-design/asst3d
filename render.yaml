# Blueprint de Render: New + > Blueprint > elegir este repo y listo.
# Un solo servicio web: Fastify sirve la API y el frontend compilado.
services:
  - type: web
    name: asst3d
    runtime: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install && pnpm --filter @asst3d/web build
    startCommand: pnpm --filter @asst3d/server start
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_VERSION
        value: 20.19.0
      # Proveedor activo: Meshy (pagado). Solo falta pegar MESHY_API_KEY en el
      # dashboard de Render (Environment) — sin la key, generar da error.
      # Para volver al modo demo sin gastar créditos: PROVIDER=mock.
      - key: PROVIDER
        value: meshy
      - key: THREEDAI_API_KEY
        sync: false
      # PBR en texto→3D: mejor calidad, +20 créditos por generación (80 vs 60)
      - key: THREEDAI_PBR
        value: "false"
      - key: MESHY_API_KEY
        sync: false
      - key: FREE_GENERATIONS_PER_USER
        value: "3"
      # Códigos promo (una vez por usuario): "CODIGO:gens,OTRO:5"
      - key: PROMO_CODES
        value: "FREE3:3"
      - key: GLOBAL_MONTHLY_CAP
        value: "200"
      - key: MESHY_MIN_BALANCE
        value: "20"
      - key: RATE_LIMIT_MAX_PER_MINUTE
        value: "3"
      - key: RATE_LIMIT_MAX_PER_HOUR
        value: "10"
      - key: PAYMENTS_ENABLED
        value: "false"
      # OJO: en el plan free el disco es efímero (la DB SQLite se resetea en cada deploy).
      # Para persistir: agregar un disk en Render y setear DATA_DIR al mount path.
      # - key: DATA_DIR
      #   value: /var/data
# disk:
#   name: asst3d-data
#   mountPath: /var/data
#   sizeGB: 1
